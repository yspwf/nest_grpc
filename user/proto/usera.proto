syntax = "proto3";
package user;

service UserService {
  rpc FindOne (FindOneRequest) returns (FindOneResponse);
  rpc Create (CreateRequest) returns (CreateResponse);
}

message FindOneRequest {
  string username = 1;
  string password = 2;
}

message FindOneResponse {
  uint32 id = 1;
  string username = 2;
  string accessToken = 3;
}

message CreateRequest {
  string username = 1;
  string password = 2;
}

message CreateResponse {
  uint32 id = 1;
  string username = 2;
  string accessToken = 3;
  repeated UserRole userRole = 4;  // 嵌套对象 
}

message UserRole {
  uint32 roleId = 1;
  uint32 userId = 2;
}
